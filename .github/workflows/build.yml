name: Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v5
        with:
          path: "src"

      - name: Checkout Builds Branch
        uses: actions/checkout@v5
        with:
          ref: "builds"
          path: "builds"

      - name: Clean old builds
        run: |
          rm $GITHUB_WORKSPACE/builds/*.cs3 || true
          rm $GITHUB_WORKSPACE/builds/*.jar || true

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: adopt
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Build Plugins
        working-directory: ${{ github.workspace }}/src
        run: |
          chmod +x gradlew
          ./gradlew make makePluginsJson
          cp **/build/*.cs3 ${{ github.workspace }}/builds/
          cp build/plugins.json ${{ github.workspace }}/builds/
          python3 - <<'PY'
          import glob, json, os, sys
          plugins = json.load(open(os.path.join(os.environ["GITHUB_WORKSPACE"], "builds", "plugins.json")))
          expected = sorted(p["internalName"] for p in plugins)
          actual = sorted(os.path.splitext(os.path.basename(p))[0] for p in glob.glob(os.path.join(os.environ["GITHUB_WORKSPACE"], "builds", "*.cs3")))
          missing = sorted(set(expected) - set(actual))
          extra = sorted(set(actual) - set(expected))
          if missing or extra:
              print("Plugin artifact mismatch")
              print("missing:", missing)
              print("extra:", extra)
              sys.exit(1)
          print(f"Validated {len(actual)} plugin artifacts")
          PY

      - name: Update plugins.json size & hash
        working-directory: ${{ github.workspace }}/builds
        run: |
          echo "" | base64 -d | python3
          cat plugins.json

      - name: Push builds
        working-directory: ${{ github.workspace }}/builds
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          
          if git diff --staged --quiet; then
            echo "do not error if nothing to commit."
            exit 0
          fi
          
          git commit --amend -m "Build ${{ github.sha }}"
          git push --force
